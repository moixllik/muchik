<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diccionario Muchik</title>
    <meta name="description" content="Diccionario de la lengua Muchik / Mochica / Yunga del norte de Perú">

    <link rel="stylesheet" href="/muchik/data/css/index.css">

    <script async type="module" src="/muchik/data/js/results.mjs"></script>
</head>

<body>
    <noscript>Se requiere JavaScript</noscript>
    <header>
        <form action="/muchik/data/">
            <input type="search" name="q" placeholder="Buscar">
            <button>Buscar</button>
        </form>
    </header>
    <main>
        <my-results></my-results>
    </main>
    <footer>
        &copy; 2023
        | <a href="../">Portada</a>
        | <a href="https://github.com/moixllik/muchik">Repositorio</a>
        | <a href="/muchik/data/data.sqlite">Base de Datos</a>
    </footer>

    <!-- TEMPLATES -->
    <template id="my-results">
        <div>
            <h3><a href="/muchik/data/?id={{ id }}">{{ muchik }}</a></h3>
            <pre>{{ spanish }}</pre>
        </div>
    </template>
</body>

</html>
