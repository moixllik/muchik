<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diccionario Muchik - Moixllik</title>
    <meta name="description" content="Diccionario de la lengua Muchik / Mochica / Yunga del norte de Perú">

    <link rel="stylesheet" href="/css/index.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <script async type="module" src="/js/my/sources.mjs"></script>
    <script async type="module" src="/js/my/results.mjs"></script>
</head>

<body>
    <noscript>Se requiere JavaScript</noscript>
    <header>
        <form action="/">
            <input type="search" name="q" placeholder="Buscar">
            <button>Buscar</button>
        </form>
    </header>
    <main>
        <h1><a href="/">Diccionario Muchik</a></h1>

        <section class="dn">
            <h2>Lista de resultados</h2>
            <my-results></my-results>
        </section>

        <section>
            <h2>Investigadores e informantes</h2>
            <p>
                Diccionario basado en las <a href="https://es.wikipedia.org/wiki/Idioma_mochica">investigaciones
                    documentadas</a> desde el año 1644.
            </p>
            <ul>
                <my-sources></my-sources>
            </ul>
        </section>

        <section>
            <h2>Descargar base de datos</h2>
            <p>
                Base de datos en <a href="https://www.sqlite.org/">SQLite</a>: <a
                    href="/data/data.sqlite">data.sqlite</a>
            </p>
        </section>
    </main>
    <footer>&copy; 2023</footer>

    <!-- TEMPLATES -->
    <template id="my-results">
        <div>
            <h3><a href="/?id={{ id }}">{{ muchik }}</a></h3>
            <pre>{{ spanish }}</pre>
        </div>
    </template>

    <template id="my-sources">
        <li>
            <a href="https://www.google.com.pe/search?tbm=bks&q=moche+{{ name }}">{{ key }}</a>
            {{ name }}
        </li>
    </template>
</body>

</html>
