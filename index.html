<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Diccionario Muchik</title>
    <meta name="description" content="Diccionario de la lengua Muchik / Mochica / Yunga del norte de Perú">

    <link rel="stylesheet" href="/css/index.css">
    <link rel="icon" type="image/x-icon" href="/favicon.ico">

    <script async type="module" src="/js/results.mjs"></script>
</head>

<body>
    <noscript>Se requiere JavaScript</noscript>
    <header>
        <form action="/">
            <input type="search" name="q" placeholder="Buscar">
            <button>Buscar</button>
        </form>
    </header>
    <main>
        <h1><a href="/">Diccionario Muchik</a></h1>

        <section class="dn">
            <h2>Lista de resultados</h2>
            <my-results></my-results>
        </section>
    </main>
    <footer>
        &copy; 2023
        | <a href="https://github.com/moixllik/muchik">Repositorio</a>
        | <a href="/data/data.sqlite">Base de Datos</a>
    </footer>

    <!-- TEMPLATES -->
    <template id="my-results">
        <div>
            <h3><a href="/?id={{ id }}">{{ muchik }}</a></h3>
            <pre>{{ spanish }}</pre>
        </div>
    </template>
</body>

</html>
